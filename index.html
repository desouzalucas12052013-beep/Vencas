<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Dafer Parfum Pro</title>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>


<style>


body{

margin:0;

font-family:Arial;

background:#ffe5f1;

padding:10px;

}


h2{

font-size:18px;

}


.section,.totalBox{


background:#fff;

padding:12px;

margin-bottom:12px;

border-radius:12px;

box-shadow:0 5px 12px rgba(0,0,0,.08);


}





input,select{


width:100%;

padding:12px;

margin-top:6px;

border-radius:8px;

border:1px solid #ddd;


}





button{


background:#8d3a68;

color:white;

border:0;

padding:12px;

margin-top:8px;

border-radius:8px;

width:100%;


}





.delete{


background:#b00020;


}





.tableBox{


width:100%;

overflow-x:auto;


}





table{


width:100%;

border-collapse:collapse;

margin-top:10px;


}





th{


background:#8d3a68;

color:white;

padding:8px;


}





td{


padding:8px;

border-bottom:1px solid #eee;


}





.devedor{


color:red;

font-weight:bold;


}





.ok{


color:green;

font-weight:bold;


}





@media(max-width:600px){


body{

padding:6px;

}



h2{

font-size:16px;

}



table{

font-size:12px;

}



th,td{

padding:6px;

}



button{

font-size:14px;

}


}




</style>


</head>



<body>




<div class="totalBox">


<h2>📊 TOTAL</h2>


<p>💰 Faturado:

<b id="totalFaturado">R$ 0</b>

</p>


<p>📈 Lucro:

<b id="totalLucro">R$ 0</b>

</p>


<p>⛪ Dízimo:

<b id="totalDizimo">R$ 0</b>

</p>


</div>





<div class="section">


<h2>💄 Perfumes</h2>



<input id="nome" placeholder="Nome">


<input id="compra" type="number" placeholder="Compra">


<input id="venda" type="number" placeholder="Venda">


<input id="estoque" type="number" placeholder="Estoque">



<button onclick="addPerfume()">

Adicionar / Somar

</button>




<table>


<thead>


<tr>


<th>Nome</th>

<th>Compra</th>

<th>Venda</th>

<th>Lucro</th>

<th>Estoque</th>

<th>Ação</th>


</tr>


</thead>



<tbody id="perfumes"></tbody>


</table>


</div>






<div class="section">


<h2>👤 Clientes</h2>



<input id="nomeC" placeholder="Nome">


<input id="telefone" placeholder="Telefone">


<input id="parcelas" type="number" placeholder="Parcelas">


<input id="dataPagamento" type="date">



<button onclick="addCliente()">

Adicionar

</button>
<table>


<thead>


<tr>


<th>Nome</th>

<th>Gasto</th>

<th>Pago</th>

<th>Dívida</th>

<th>Status</th>

<th>Ação</th>


</tr>


</thead>



<tbody id="clientes"></tbody>


</table>


</div>






<div class="section">


<h2>🛒 Venda</h2>



<select id="clienteSelect"></select>



<select id="perfumeSelect"></select>




<input id="qtd" type="number" placeholder="Quantidade">




<button onclick="vender()">

Vender

</button>



</div>






<div class="section">


<h2>💵 Pagamento</h2>



<select id="clientePay"></select>



<input id="valorPay" type="number" placeholder="Valor">



<button onclick="pagar()">

Registrar

</button>



</div>







<script>





const firebaseConfig = {


apiKey: "AIzaSyDRDC38Z-gln6hAvK4xtkAYij5_M2TvYRk",


authDomain: "dafer-2d4af.firebaseapp.com",


projectId: "dafer-2d4af",


storageBucket: "dafer-2d4af.firebasestorage.app",


messagingSenderId: "1043309416391",


appId: "1:1043309416391:web:477f1eb8681cf5428c93e2"


};






firebase.initializeApp(firebaseConfig);



const db = firebase.firestore();






let clientes=[];


let perfumes=[];







function formatDate(d){



if(!d) return "-";



let [y,m,day]=d.split("-");



return `${day}/${m}`;



}








function addPerfume(){



let n=nome.value.trim();




if(!n)return;






db.collection("perfumes")

.where("nome","==",n)

.get()

.then(snapshot=>{





if(!snapshot.empty){



snapshot.forEach(doc=>{



let p=doc.data();




db.collection("perfumes")

.doc(doc.id)

.update({



estoque:p.estoque + Number(estoque.value)



});



});





}else{



db.collection("perfumes").add({



nome:n,


compra:Number(compra.value),


venda:Number(venda.value),


estoque:Number(estoque.value),


vendidos:0



});



}




});



}







function deletePerfume(id){



db.collection("perfumes")

.doc(id)

.delete();



}








function addCliente(){



db.collection("clientes").add({



nome:nomeC.value,


telefone:telefone.value,


parcelas:Number(parcelas.value),


dataPagamento:dataPagamento.value,


gasto:0,


pago:0



});



}






function deleteCliente(id){



db.collection("clientes")


.doc(id)


.delete();



}








function vender(){



let c=clientes[clienteSelect.value];



let p=perfumes[perfumeSelect.value];



let q=Number(qtd.value);




if(!c || !p || !q)return;







db.collection("clientes")


.doc(c.id)


.update({



gasto:c.gasto+(q*p.venda)



});







db.collection("perfumes")


.doc(p.id)


.update({



estoque:p.estoque-q,


vendidos:(p.vendidos||0)+q



});



}







function pagar(){



let c=clientes[clientePay.value];



let valor=Number(valorPay.value);




if(!c)return;





db.collection("clientes")


.doc(c.id)


.update({



pago:c.pago+valor



});



}



// CLIENTES FIREBASE


db.collection("clientes")

.onSnapshot(snapshot=>{


clientes=[];



snapshot.forEach(doc=>{


clientes.push({

id:doc.id,

...doc.data()

});


});



render();



});








// PERFUMES FIREBASE



db.collection("perfumes")

.onSnapshot(snapshot=>{



perfumes=[];



snapshot.forEach(doc=>{


perfumes.push({

id:doc.id,

...doc.data()

});


});



render();



});









function render(){



perfumesEl.innerHTML="";


clientesEl.innerHTML="";


clienteSelect.innerHTML="";


clientePay.innerHTML="";


perfumeSelect.innerHTML="";





let lucro=0;


let faturado=0;







perfumes.forEach(p=>{



let l=p.venda-p.compra;



lucro += l*(p.vendidos||0);



faturado += p.venda*(p.vendidos||0);






perfumesEl.innerHTML += `


<tr>


<td>${p.nome}</td>


<td>R$ ${p.compra}</td>


<td>R$ ${p.venda}</td>


<td>R$ ${l}</td>


<td>${p.estoque}</td>



<td>


<button class="delete"


onclick="deletePerfume('${p.id}')">


X


</button>


</td>



</tr>



`;






perfumeSelect.innerHTML += `


<option value="${perfumes.indexOf(p)}">


${p.nome}


</option>


`;



});








clientes.forEach(c=>{



let divida=c.gasto-c.pago;





clientesEl.innerHTML += `


<tr>



<td>${c.nome}</td>



<td>R$ ${c.gasto}</td>



<td>R$ ${c.pago}</td>



<td>R$ ${divida}</td>




<td class="${divida>0?'devedor':'ok'}">


${divida>0?'🔴 Devendo':'🟢 Pago'}



</td>



<td>


<button class="delete"


onclick="deleteCliente('${c.id}')">


X


</button>



</td>



</tr>



`;







clienteSelect.innerHTML += `


<option value="${clientes.indexOf(c)}">


${c.nome}


</option>


`;







clientePay.innerHTML += `


<option value="${clientes.indexOf(c)}">


${c.nome}


</option>


`;



});








document.getElementById("totalFaturado").innerText =


"R$ "+faturado.toFixed(2);






document.getElementById("totalLucro").innerText =


"R$ "+lucro.toFixed(2);






document.getElementById("totalDizimo").innerText =


"R$ "+(lucro*0.1).toFixed(2);



}







const perfumesEl=document.getElementById("perfumes");


const clientesEl=document.getElementById("clientes");





</script>



</body>


</html>
